<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BotiX - Névjegykártya</title>
    <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }

        body {
            background: #e8e8e8;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Montserrat', sans-serif;
            gap: 40px;
            padding: 40px;
        }

        h2 {
            color: #888;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 4px;
            font-weight: 300;
        }

        h3 {
            color: #aaa;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 400;
            margin-top: 20px;
        }

        .card {
            width: 340px;
            height: 194px;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        /* ====== DARK THEME ====== */
        .dark {
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 30px rgba(212, 120, 30, 0.06);
        }

        .dark .card-front {
            background: linear-gradient(145deg, #0d0d0d 0%, #1a1a1a 50%, #0d0d0d 100%);
        }

        .dark .card-front::before,
        .dark .card-back::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #D4781E, #E89530, #D4781E, transparent);
        }

        .dark .card-front .person-name { color: #fff; }
        .dark .card-front .detail { color: rgba(255, 255, 255, 0.5); }
        .dark .card-front .detail a { color: rgba(255, 255, 255, 0.5); }
        .dark .card-front .detail a:hover { color: #D4781E; }
        .dark .card-front .scan-text { color: rgba(255, 255, 255, 0.25); }
        .dark .card-front .qr-box { background: #fff; }

        .dark .accent-bottom,
        .dark .card-back::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, #D4781E, #E89530, #D4781E, transparent);
        }

        .dark .card-back {
            background: linear-gradient(145deg, #0d0d0d 0%, #1a1a1a 100%);
        }

        .dark .card-back .url { color: rgba(255, 255, 255, 0.3); }
        .dark .card-back .corner { border-color: rgba(212, 120, 30, 0.12); }
        .dark .card-back .logo-img-back { filter: drop-shadow(0 4px 15px rgba(212, 120, 30, 0.3)); }

        /* ====== LIGHT THEME ====== */
        .light {
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1), 0 0 0 1px rgba(0, 0, 0, 0.04);
        }

        .light .card-front {
            background: linear-gradient(145deg, #ffffff 0%, #fafafa 50%, #ffffff 100%);
        }

        .light .card-front::before,
        .light .card-back::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #D4781E, #E89530, #D4781E);
        }

        .light .card-front .logo-img {
            filter: drop-shadow(0 2px 6px rgba(0, 0, 0, 0.15));
        }

        .light .card-front .person-name { color: #1a1a1a; }
        .light .card-front .detail { color: rgba(0, 0, 0, 0.45); }
        .light .card-front .detail svg { fill: #D4781E; }
        .light .card-front .detail a { color: rgba(0, 0, 0, 0.45); }
        .light .card-front .detail a:hover { color: #D4781E; }
        .light .card-front .scan-text { color: rgba(0, 0, 0, 0.25); }
        .light .card-front .qr-box { background: #fff; border: 1px solid rgba(0,0,0,0.06); }

        .light .accent-bottom,
        .light .card-back::after {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, #D4781E, #E89530, #D4781E);
        }

        .light .card-back {
            background: linear-gradient(145deg, #ffffff 0%, #fafafa 100%);
        }

        .light .card-back .logo-img-back { filter: drop-shadow(0 3px 10px rgba(0, 0, 0, 0.12)); }
        .light .card-back .url { color: rgba(0, 0, 0, 0.3); }
        .light .card-back .corner { border-color: rgba(212, 120, 30, 0.2); }

        /* ====== SHARED CARD STYLES ====== */
        .card-front {
            display: flex;
            padding: 22px 24px;
            gap: 16px;
        }

        .card-front .left {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-front .logo-img {
            height: 42px;
            width: auto;
            align-self: flex-start;
        }

        .dark .card-front .logo-img {
            filter: drop-shadow(0 2px 8px rgba(212, 120, 30, 0.25));
        }

        .card-front .info {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .card-front .person-name {
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }

        .card-front .detail {
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: 0.3px;
        }

        .card-front .detail svg {
            width: 12px;
            height: 12px;
            fill: #D4781E;
            flex-shrink: 0;
        }

        .card-front .detail a {
            text-decoration: none;
            transition: color 0.2s;
        }

        .card-front .right {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
        }

        .card-front .qr-box {
            border-radius: 6px;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card-front .qr-box img { display: block; }

        .card-front .scan-text {
            font-size: 7px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-weight: 600;
        }

        .accent-bottom {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 3px;
        }

        .card-back {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 14px;
        }

        .card-back .logo-img-back {
            height: 72px;
            width: auto;
        }

        .card-back .url {
            font-size: 9px;
            letter-spacing: 3px;
            text-transform: lowercase;
            font-weight: 300;
        }

        .card-back .corner {
            position: absolute;
            width: 30px;
            height: 30px;
            border: 1.5px solid;
        }

        .card-back .corner.tl { top: 14px; left: 14px; border-right: none; border-bottom: none; border-radius: 3px 0 0 0; }
        .card-back .corner.br { bottom: 14px; right: 14px; border-left: none; border-top: none; border-radius: 0 0 3px 0; }

        .print-hint {
            color: #888;
            font-size: 11px;
            text-align: center;
            line-height: 1.8;
            font-weight: 300;
        }

        @media print {
            body { background: white !important; gap: 15px; padding: 10px; }
            h2, h3, .print-hint { display: none; }
            .card { box-shadow: none !important; border: 1px solid #ddd !important; }
        }
    </style>
</head>
<body>

<!-- ========== DARK VARIANT ========== -->
<h3>Dark</h3>

<h2>Eleje</h2>
<div class="card dark card-front">
    <div class="left">
        <img class="logo-img" src="src/main/resources/static/images/botix-logo-landscape.png" alt="BotiX">
        <div class="info">
            <div class="person-name">Husz&aacute;r Botond</div>
            <div class="detail">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                <a href="https://botix.hu" target="_blank">botix.hu</a>
            </div>
            <div class="detail">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                <a href="mailto:info@botix.hu">info@botix.hu</a>
            </div>
        </div>
    </div>
    <div class="right">
        <div class="qr-box" id="qrCode1"></div>
        <div class="scan-text">Scan me</div>
    </div>
    <div class="accent-bottom"></div>
</div>

<h2>H&aacute;toldal</h2>
<div class="card dark card-back">
    <div class="corner tl"></div>
    <img class="logo-img-back" src="src/main/resources/static/images/botix-logo-landscape.png" alt="BotiX">
    <div class="url">botix.hu</div>
    <div class="corner br"></div>
</div>

<!-- ========== LIGHT VARIANT ========== -->
<h3>Light</h3>

<h2>Eleje</h2>
<div class="card light card-front">
    <div class="left">
        <img class="logo-img" src="src/main/resources/static/images/botix-logo-landscape.png" alt="BotiX">
        <div class="info">
            <div class="person-name">Husz&aacute;r Botond</div>
            <div class="detail">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
                <a href="https://botix.hu" target="_blank">botix.hu</a>
            </div>
            <div class="detail">
                <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
                <a href="mailto:info@botix.hu">info@botix.hu</a>
            </div>
        </div>
    </div>
    <div class="right">
        <div class="qr-box" id="qrCode2"></div>
        <div class="scan-text">Scan me</div>
    </div>
    <div class="accent-bottom"></div>
</div>

<h2>H&aacute;toldal</h2>
<div class="card light card-back">
    <div class="corner tl"></div>
    <img class="logo-img-back" src="src/main/resources/static/images/botix-logo-landscape.png" alt="BotiX">
    <div class="url">botix.hu</div>
    <div class="corner br"></div>
</div>

<div class="print-hint">
    PDF ment&eacute;s: Ctrl+P / Cmd+P &rarr; Save as PDF &middot; M&eacute;ret: 90 &times; 50 mm
</div>

<script>
    var qr = qrcode(0, 'M');
    qr.addData('https://botix.hu/');
    qr.make();
    var cellSize = Math.floor(90 / qr.getModuleCount());
    var qrImg = qr.createImgTag(cellSize, 0);
    document.getElementById('qrCode1').innerHTML = qrImg;
    document.getElementById('qrCode2').innerHTML = qrImg;
</script>
</body>
</html>
